<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sty.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <header>
        <button class="hamburger-menu" aria-label="メニューを開く">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>
    </header>
    <nav class="slide-menu">
        <ul class="menu-list">
            <li><a href="#home">ホーム</a></li>
            <li><a href="#about">会社概要</a></li>
            <li><a href="#services">サービス</a></li>
            <li><a href="#contact">お問い合わせ</a></li>
        </ul>
    </nav>
    <div class="slide_area">
        <div class="slides">
        <!--    <img id="img" src="images/capture250-8.png">    -->
        </div>
        <div class="btn_area">
            <button class="prev">前へ</button>
            <button class="next">次へ</button>
        </div>
        <div class="check_area">
            <button class="check num1">[1]</button>
            <button class="check num2">[2]</button>
            <button class="check num3">[3]</button>
            <button class="check num4">[4]</button>
            <button class="check num5">[5]</button>
        </div>
    </div>
    <div class="restrat-area">
        <button class="restart">START</button>
        <button class="stop">STOP</button>
    </div>

</div>
</body>
</html>
